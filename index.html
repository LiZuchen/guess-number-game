<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>猜数字游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 2em;
            line-height: 1.2;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 1em;
        }

        .setup-phase, .game-phase {
            display: none;
        }

        .setup-phase.active, .game-phase.active {
            display: block;
        }

        .player-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .player-section.player2 {
            border-left-color: #764ba2;
        }

        .player-section h2 {
            color: #333;
            margin-bottom: 12px;
            font-size: 1.3em;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 0;
        }

        input[type="number"] {
            flex: 1;
            padding: 14px 10px;
            font-size: 1.4em;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            letter-spacing: 5px;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 14px 24px;
            font-size: 1em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .game-info {
            background: #e8f4f8;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }

        .game-info h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .turn-indicator {
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
        }

        .guess-section {
            background: #fff3cd;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            border-left: 4px solid #ffc107;
        }

        .guess-section h3 {
            color: #333;
            margin-bottom: 12px;
            font-size: 1.2em;
        }

        .feedback {
            background: #d4edda;
            border-radius: 8px;
            padding: 15px;
            margin-top: 12px;
            text-align: center;
            font-size: 1.1em;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
        }

        .history {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 18px;
            margin-top: 15px;
        }

        .history h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .history-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .history-column {
            background: white;
            border-radius: 8px;
            padding: 12px;
            max-height: 280px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .history-column h4 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1em;
            text-align: center;
            border-bottom: 2px solid #667eea;
            padding-bottom: 6px;
        }

        .history-column.player2-col h4 {
            color: #764ba2;
            border-bottom-color: #764ba2;
        }

        .history-item {
            padding: 10px;
            margin-bottom: 6px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:last-child {
            margin-bottom: 0;
        }

        .history-guess {
            color: #333;
            font-weight: bold;
            font-size: 1.05em;
        }

        .history-result {
            color: #28a745;
            font-weight: bold;
            font-size: 1em;
        }

        .winner-section {
            display: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            color: white;
            margin-top: 15px;
            animation: popIn 0.3s ease;
        }

        .winner-section.active {
            display: block;
        }

        .winner-section h2 {
            font-size: 2em;
            margin-bottom: 12px;
        }

        .winner-section p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .winner-section button {
            font-size: 1.2em;
            padding: 14px 35px;
            background: white;
            color: #667eea;
        }

        .winner-section button:active {
            transform: scale(0.97);
        }

        .winner-section button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,255,255,0.3);
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f00;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
            }
        }

        .hidden-number {
            font-size: 2em;
            letter-spacing: 10px;
            color: #667eea;
            text-align: center;
            margin: 20px 0;
        }

        /* 移动端优化 */
        @media (max-width: 600px) {
            body {
                padding: 10px;
                align-items: flex-start;
            }

            .container {
                padding: 20px 15px;
                border-radius: 12px;
            }

            h1 {
                font-size: 1.6em;
            }

            .subtitle {
                font-size: 0.95em;
                margin-bottom: 15px;
            }

            .player-section {
                padding: 15px;
                margin-bottom: 12px;
            }

            .player-section h2 {
                font-size: 1.2em;
            }

            .input-group {
                flex-direction: column;
            }

            input[type="number"] {
                padding: 16px 10px;
                font-size: 1.6em;
                margin-bottom: 10px;
            }

            button {
                width: 100%;
                padding: 16px;
                font-size: 1.1em;
            }

            #startButton button {
                margin-top: 10px;
            }

            .game-info {
                padding: 12px;
            }

            .turn-indicator {
                font-size: 1.1em;
            }

            .guess-section {
                padding: 15px;
            }

            .guess-section h3 {
                font-size: 1.1em;
            }

            .feedback {
                font-size: 1em;
                padding: 12px;
            }

            .history {
                padding: 15px;
            }

            .history h3 {
                font-size: 1.1em;
            }

            .history-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .history-column {
                max-height: 200px;
                padding: 10px;
            }

            .history-column h4 {
                font-size: 1em;
                margin-bottom: 8px;
            }

            .history-item {
                padding: 8px;
                font-size: 0.95em;
            }

            .winner-section {
                padding: 25px 15px;
            }

            .winner-section h2 {
                font-size: 1.8em;
            }

            .winner-section p {
                font-size: 1.1em;
            }

            .winner-section button {
                width: 100%;
                padding: 16px;
                font-size: 1.15em;
            }

            .confetti {
                width: 8px;
                height: 8px;
            }
        }

        /* 超小屏幕优化 */
        @media (max-width: 360px) {
            .container {
                padding: 15px 12px;
            }

            h1 {
                font-size: 1.4em;
            }

            .player-section h2 {
                font-size: 1.1em;
            }

            input[type="number"] {
                font-size: 1.4em;
            }

            .history-column {
                max-height: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 猜数字游戏</h1>
        <p class="subtitle">两人对战 - 猜中对方数字者胜</p>

        <!-- 设置阶段 -->
        <div class="setup-phase active" id="setupPhase">
            <div class="player-section">
                <h2 id="player1Title">👤 玩家 1</h2>
                <p style="margin-bottom: 10px; color: #666;">请输入一个四位数（1000-9999）：</p>
                <div class="input-group">
                    <input type="number" id="player1Number" min="1000" max="9999" placeholder="****">
                    <button onclick="setPlayer1Number()">确认</button>
                </div>
            </div>

            <div class="player-section player2">
                <h2 id="player2Title">👤 玩家 2</h2>
                <p style="margin-bottom: 10px; color: #666;">请输入一个四位数（1000-9999）：</p>
                <div class="input-group">
                    <input type="number" id="player2Number" min="1000" max="9999" placeholder="****">
                    <button onclick="setPlayer2Number()">确认</button>
                </div>
            </div>

            <div id="startButton" style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 2px dashed #ddd; display: none;">
                <p style="color: #667eea; margin-bottom: 15px; font-size: 1.1em; font-weight: bold;">✅ 双方已准备就绪</p>
                <button onclick="startGame()" style="font-size: 1.3em; padding: 20px 50px;">🎮 开始游戏</button>
            </div>
        </div>

        <!-- 游戏阶段 -->
        <div class="game-phase" id="gamePhase">
            <div class="game-info">
                <h3>🎮 游戏进行中</h3>
                <p class="turn-indicator" id="turnIndicator">玩家 1 的回合</p>
            </div>

            <div class="guess-section">
                <h3 id="guessTitle">玩家 1 猜玩家 2 的数字</h3>
                <div class="input-group">
                    <input type="number" id="guessInput" min="1000" max="9999" placeholder="****">
                    <button onclick="makeGuess()">猜！</button>
                </div>
                <div id="feedback" class="feedback" style="display: none;"></div>
            </div>

            <div class="history">
                <h3>📜 猜测历史</h3>
                <div class="history-grid">
                    <div class="history-column player1-col">
                        <h4>👤 玩家 1</h4>
                        <div id="historyPlayer1"></div>
                    </div>
                    <div class="history-column player2-col">
                        <h4>👤 玩家 2</h4>
                        <div id="historyPlayer2"></div>
                    </div>
                </div>
            </div>

            <!-- 胜利区域 -->
            <div class="winner-section" id="winnerSection" style="display: none;">
                <h2>🎉</h2>
                <p id="winnerText">玩家 X 获胜！</p>
                <button onclick="restartGame()">再来一局</button>
            </div>
        </div>
    </div>

    <script>
        let player1Number = '';
        let player2Number = '';
        let player1Set = false;
        let player2Set = false;
        let currentPlayer = 1;
        let history = [];
        let player1Guesses = 0;
        let player2Guesses = 0;

        // 修复：修正玩家1/2标题更新的DOM定位
        function setPlayer1Number() {
            const input = document.getElementById('player1Number');
            const value = input.value.trim();
            
            // 修复：完善输入验证，处理空值和非数字情况
            if (!value || isNaN(value) || value.length !== 4 || parseInt(value) < 1000 || parseInt(value) > 9999) {
                alert('请输入有效的四位数（1000-9999）');
                input.focus();
                return;
            }
            
            player1Number = value;
            player1Set = true;
            input.value = '';
            input.disabled = true;
            document.getElementById('player1Title').innerHTML = '✅ 玩家 1 (数字已设置)';
            
            checkSetupComplete();
        }

        function setPlayer2Number() {
            const input = document.getElementById('player2Number');
            const value = input.value.trim();
            
            if (!value || isNaN(value) || value.length !== 4 || parseInt(value) < 1000 || parseInt(value) > 9999) {
                alert('请输入有效的四位数（1000-9999）');
                input.focus();
                return;
            }
            
            player2Number = value;
            player2Set = true;
            input.value = '';
            input.disabled = true;
            document.getElementById('player2Title').innerHTML = '✅ 玩家 2 (数字已设置)';
            
            checkSetupComplete();
        }

        function checkSetupComplete() {
            if (player1Set && player2Set) {
                document.getElementById('startButton').style.display = 'block';
            }
        }

        function startGame() {
            document.getElementById('setupPhase').classList.remove('active');
            document.getElementById('gamePhase').classList.add('active');
            updateTurnIndicator();
            // 自动聚焦到猜测输入框
            document.getElementById('guessInput').focus();
        }

        function updateTurnIndicator() {
            const indicator = document.getElementById('turnIndicator');
            const guessTitle = document.getElementById('guessTitle');
            
            if (currentPlayer === 1) {
                indicator.textContent = '🎯 玩家 1 的回合';
                guessTitle.textContent = '玩家 1 猜玩家 2 的数字';
            } else {
                indicator.textContent = '🎯 玩家 2 的回合';
                guessTitle.textContent = '玩家 2 猜玩家 1 的数字';
            }
            
            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').focus();
            document.getElementById('feedback').style.display = 'none';
        }

        // 修复：优化猜测逻辑，避免重复计数，增强用户体验
        function makeGuess() {
            const input = document.getElementById('guessInput');
            const guess = input.value.trim();
            
            if (!guess || isNaN(guess) || guess.length !== 4 || parseInt(guess) < 1000 || parseInt(guess) > 9999) {
                alert('请输入有效的四位数（1000-9999）');
                input.focus();
                return;
            }
            
            const targetNumber = currentPlayer === 1 ? player2Number : player1Number;
            const correctCount = countCorrectDigits(guess, targetNumber);
            
            // 记录历史
            const guesser = currentPlayer === 1 ? '玩家 1' : '玩家 2';
            history.push({
                player: guesser,
                guess: guess,
                correct: correctCount
            });
            
            // 更新猜测次数（修复：只在非获胜时计数，避免多算一次）
            if (correctCount !== 4) {
                if (currentPlayer === 1) {
                    player1Guesses++;
                } else {
                    player2Guesses++;
                }
            }
            
            // 显示反馈
            const feedback = document.getElementById('feedback');
            feedback.style.display = 'block';
            
            if (correctCount === 4) {
                feedback.textContent = `🎉 恭喜！猜对了 ${correctCount} 个数字！胜利！`;
                feedback.className = 'feedback';
                addToHistory();
                // 修复：立即显示胜利弹窗，避免延迟导致的交互问题
                showWinner(currentPlayer);
            } else {
                feedback.textContent = `对了 ${correctCount} 个数字，继续加油！`;
                feedback.className = 'feedback incorrect';
                addToHistory();
                
                // 切换玩家（缩短延迟，提升流畅度）
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                setTimeout(updateTurnIndicator, 800);
            }
            
            input.value = '';
        }

        // 修复：确保数字对比的准确性（转为字符串处理）
        function countCorrectDigits(guess, target) {
            let count = 0;
            const guessStr = guess.toString().padStart(4, '0');
            const targetStr = target.toString().padStart(4, '0');
            
            for (let i = 0; i < 4; i++) {
                if (guessStr[i] === targetStr[i]) {
                    count++;
                }
            }
            return count;
        }

        function addToHistory() {
            const lastItem = history[history.length - 1];
            const isPlayer1 = lastItem.player === '玩家 1';
            const containerId = isPlayer1 ? 'historyPlayer1' : 'historyPlayer2';
            const container = document.getElementById(containerId);
            
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <span class="history-guess">猜 ${lastItem.guess}</span>
                <span class="history-result">✓ ${lastItem.correct}个</span>
            `;
            
            container.appendChild(item);
            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }

        function showWinner(winner) {
            const winnerSection = document.getElementById('winnerSection');
            const winnerText = document.getElementById('winnerText');
            
            const winnerName = winner === 1 ? '玩家 1' : '玩家 2';
            const guessCount = winner === 1 ? player1Guesses + 1 : player2Guesses + 1;
            
            winnerText.innerHTML = `🏆 ${winnerName} 获胜！<br><small style="font-size: 0.6em; opacity: 0.9;">用了 ${guessCount} 次猜测</small>`;
            
            winnerSection.style.display = 'block';
            createConfetti();
            
            // 禁用猜测输入
            document.getElementById('guessInput').disabled = true;
            document.querySelector('.guess-section button').disabled = true;
        }

        function createConfetti() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#43e97b'];
            
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 30);
            }
        }

        // 修复：重启游戏时完全重置所有状态
        function restartGame() {
            player1Number = '';
            player2Number = '';
            player1Set = false;
            player2Set = false;
            currentPlayer = 1;
            history = [];
            player1Guesses = 0;
            player2Guesses = 0;
            
            document.getElementById('winnerSection').style.display = 'none';
            document.getElementById('historyPlayer1').innerHTML = '';
            document.getElementById('historyPlayer2').innerHTML = '';
            document.getElementById('startButton').style.display = 'none';
            
            const p1Input = document.getElementById('player1Number');
            const p2Input = document.getElementById('player2Number');
            p1Input.disabled = false;
            p2Input.disabled = false;
            p1Input.value = '';
            p2Input.value = '';
            document.getElementById('player1Title').textContent = '👤 玩家 1';
            document.getElementById('player2Title').textContent = '👤 玩家 2';
            
            // 重置猜测输入框
            const guessInput = document.getElementById('guessInput');
            guessInput.disabled = false;
            guessInput.value = '';
            document.querySelector('.guess-section button').disabled = false;
            document.getElementById('feedback').style.display = 'none';
            
            // 清除所有彩带
            document.querySelectorAll('.confetti').forEach(c => c.remove());
        }

        // 优化：支持回车键提交，增加输入框失焦时的验证
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const activeElement = document.activeElement;
                if (activeElement.id === 'player1Number') {
                    setPlayer1Number();
                } else if (activeElement.id === 'player2Number') {
                    setPlayer2Number();
                } else if (activeElement.id === 'guessInput') {
                    makeGuess();
                }
                // 阻止默认行为，避免页面滚动
                e.preventDefault();
            }
        });

        // 初始化：默认显示设置阶段
        window.onload = function() {
            document.getElementById('setupPhase').classList.add('active');
            document.getElementById('player1Number').focus();
        };
    </script>
</body>
</html>
